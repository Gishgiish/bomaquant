name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
      - name: Lint
        run: ruff check src/api src/config src/services src/data_fetchers src/utils tests/unit
      - name: Type check
        run: mypy src/api src/config src/services src/data_fetchers src/utils
      - name: Run unit tests
        run: pytest tests/unit -q
